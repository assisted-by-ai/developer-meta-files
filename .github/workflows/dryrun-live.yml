## AI-Assisted

## Manual-trigger live-API dry-run. Runs `dm-github-policy --dry-run`
## against the real GitHub REST API using the GHORG_AUDIT_TOKEN repo
## secret. The dry-run prints the PATCH/PUT/POST calls it WOULD make
## (prefixed with "DRY-RUN:") but never actually mutates anything.
## Useful for previewing a policy change before someone runs --apply
## from a workstation with a write-scoped PAT.
##
## Read-only PAT permissions are sufficient because the dry-run never
## hits a write endpoint - it only resolves current state via GET and
## prints the planned writes. The same secret as audit-live.yml is
## reused so operators only mint one read-only token.
##
## To enable: see audit-live.yml (same GHORG_AUDIT_TOKEN secret).
## To run: Actions tab -> "github-org tools (live dry-run)" workflow
## -> Run workflow.
##
## To revoke: delete the secret in the same UI, or revoke the PAT in
## the user's Developer settings.

name: github-org tools (live dry-run)

on:
  workflow_dispatch:

## Read-only on the checked-out source. The dry-run does not touch
## the repository content; it only calls the GitHub REST API for GET
## and prints what it would write.
permissions:
  contents: read

jobs:
  live-dryrun:
    name: dm-github-policy --dry-run (live)
    runs-on: ubuntu-latest
    container:
      image: debian:trixie

    ## Skip on forks so a fork's workflow can never use the upstream
    ## secret (GitHub also blocks this by default for forked PRs, but
    ## the explicit guard documents intent).
    if: ${{ github.repository == 'assisted-by-ai/developer-meta-files' }}

    steps:
      - name: Install apt pre-reqs
        run: |
          set -o errexit
          set -o nounset
          set -o pipefail
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install --yes --no-install-recommends -- \
            ca-certificates curl jq git sudo build-essential dctrl-tools \
            python3

      - name: Checkout developer-meta-files
        uses: actions/checkout@v6

      - name: Install genmkfile
        env:
          CI: "true"
        run: ./ci/install-genmkfile.sh

      - name: Install helper-scripts (provides sanitize-string)
        env:
          CI: "true"
        run: ./ci/install-helper-scripts.sh

      - name: Install developer-meta-files
        run: GENMKFILE_DEBUG=1 genmkfile install

      - name: Verify token secret is set
        env:
          token_present: ${{ secrets.GHORG_AUDIT_TOKEN != '' }}
        run: |
          set -o errexit
          set -o nounset
          set -o pipefail
          if [ "$token_present" != 'true' ]; then
             printf 'error: GHORG_AUDIT_TOKEN secret is not set on this repo.\n' >&2
             printf '       Add it under Settings -> Secrets and variables -> Actions.\n' >&2
             exit 1
          fi
          printf 'GHORG_AUDIT_TOKEN secret detected.\n'

      - name: Run dm-github-policy --dry-run (live)
        env:
          GITHUB_TOKEN: ${{ secrets.GHORG_AUDIT_TOKEN }}
        run: dm-github-policy --dry-run
